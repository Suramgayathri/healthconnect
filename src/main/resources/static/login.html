<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HealthConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="auth-container">
        <a href="index.html" class="logo">
            <i class="fas fa-heartbeat"></i> HealthConnect
        </a>

        <div class="auth-header">
            <h2>Welcome Back!</h2>
            <p>Sign in to access your dashboard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email or Phone</label>
                <div class="input-group">
                    <i class="fas fa-user-circle"></i>
                    <input type="text" class="form-control" id="identifier" placeholder="Enter email or phone number"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password"
                        required>
                    <i class="fas fa-eye" style="left: auto; right: 1.2rem; cursor: pointer;"
                        onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="forgot_password.html" class="forgot-link">Forgot Password?</a>
            </div>

            <div id="errorMessage"
                style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none; text-align: center;">
            </div>

            <button type="submit" id="loginBtn" class="btn btn-primary">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>

            <!-- Optional Social Login -->
            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fab fa-google" style="color: #DB4437;"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-facebook" style="color: #4267B2;"></i> Facebook
                    </button>
                </div>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
