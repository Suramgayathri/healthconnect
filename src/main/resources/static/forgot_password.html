<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HealthConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/forgot_password.css">
</head>

<body>

    <div class="auth-container">
        <!-- Step 1: Send Reset Request -->
        <div id="step1">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h2>Forgot Password?</h2>
                <p>No worries, we'll send you reset instructions.</p>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="text" class="form-control" id="resetIdentifier" placeholder="Enter email or phone"
                        required>
                </div>
            </div>
            <button type="button" class="btn" onclick="nextStep(2)">Reset Password</button>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2">
            <div class="auth-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Password Reset</h2>
                <p>We sent a 4-digit code to your email/phone.</p>
            </div>
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveToNext(this, event)">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveToNext(this, event)">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveToNext(this, event)">
                <input type="text" maxlength="1" class="otp-input" onkeyup="moveToNext(this, event)">
            </div>
            <button type="button" class="btn" onclick="nextStep(3)">Verify Code</button>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3">
            <div class="auth-header">
                <i class="fas fa-lock"></i>
                <h2>Set new password</h2>
                <p>Your new password must be different.</p>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="newPassword" placeholder="New Password" required>
                </div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password"
                        required>
                </div>
            </div>
            <button type="button" class="btn" onclick="finishReset()">Update Password</button>
        </div>

        <div class="auth-footer">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Back to sign in</a>
        </div>
    </div>

    <script src="js/forgot_password.js"></script>
<script src="/js/notification_handler.js"></script>
</body>

</html>
