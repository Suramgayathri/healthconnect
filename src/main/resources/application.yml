spring:
  application:
    name: healthconnect

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/healthsystem
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Config
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates/updates tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # Email Configuration (Optional - for production)
  # Uncomment and configure for real email sending
  # mail:
  #   host: smtp.gmail.com
  #   port: 587
  #   username: your-email@gmail.com
  #   password: your-app-password
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         starttls:
  #           enable: true

  # Servlet & File Upload Configuration (Required for Medical Records)
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 15MB
      file-size-threshold: 2KB

# JSON Web Token (JWT) Configuration
jwt:
  # Secret key MUST be minimum 256 bits for HS256 algorithm
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnoughThisIsToBeUsedInHealthConnectApp2023ForTestingAndShouldBeAtLeast256Bits
  expiration: 86400000 # 24 hours in milliseconds

# Application Specific Configurations
app:
  cors:
    allowed-origins: http://localhost:8080,http://localhost:3000
    
  upload:
    dir: uploads/records
    dir-prescriptions: uploads/prescriptions

# Logging levels
logging:
  level:
    root: INFO
    com.digitalclinic: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

# WebSocket Configuration
websocket:
  allowed-origins: http://localhost:8080,http://localhost:3000
