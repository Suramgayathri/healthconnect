spring:
  application:
    name: healthconnect

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/healthconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: system
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Config
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates/updates tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  # SQL initialization
  sql:
    init:
      mode: always
      continue-on-error: true

  # Servlet & File Upload Configuration (Required for Medical Records)
  servlet:
    multipart:
      enabled: true
      max-file-size: 15MB
      max-request-size: 15MB
      file-size-threshold: 2KB

# JSON Web Token (JWT) Configuration
jwt:
  # Secret key MUST be minimum 256 bits for HS256 algorithm
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnoughThisIsToBeUsedInHealthConnectApp2023ForTestingAndShouldBeAtLeast256Bits
  expiration: 86400000 # 24 hours in milliseconds

# Application Specific Configurations
app:
  cors:
    allowed-origins: http://localhost:8080,http://localhost:3000
    
  upload:
    dir: uploads/records
    dir-prescriptions: uploads/prescriptions

# Logging levels
logging:
  level:
    root: INFO
    com.digitalclinic: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

# WebSocket Configuration
websocket:
  allowed-origins: http://localhost:8080,http://localhost:3000
